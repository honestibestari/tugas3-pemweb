<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Saya</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 40px;
            background: rgb(255, 190, 222);
            border-bottom: 1px solid #f5bbcd;
        }

        nav .logo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #ad1457;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 28px;
        }

        nav ul a {
            text-decoration: none;
            color: #ad1457;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        nav ul a:hover {
            color: rgb(231, 40, 40);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            color: #25101e;
        }

        #home {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 40px 40px;
            background-color: #fcddef;
        }

        .hero-inner {
            display: flex;
            align-items: center;
            gap: 60px;
            max-width: 860px;
            width: 100%;
        }

        .hero-photo img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fce4ec;
            display: block;
        }

        .hero-text .greeting {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
            font-size: 3rem;
            color: #ad1457;
            line-height: 1.2;
            margin-bottom: 25px;
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #7b3f5e;
            margin-bottom: 25px;
        }

        .hero-text .tagline {
            font-size: 1.3rem;
            font-weight: 300;
            color: #b07090;
            margin-bottom: 30px;
        }

        .hero-text a {
            display: inline-block;
            background: #ad1457;
            color: white;
            padding: 11px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .hero-text a:hover {
            background: rgb(255, 176, 176);      /* tambah ini */
            color: #5f0e31; 
        }


        #about {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            background-color: #fad4ea;
            text-align: center;
        }

        #about h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            color: #ad1457;
            margin-bottom: 40px;
            text-align: center;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 700px;
        }

        .contact-card {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #fffaf9;
            border: 1px solid #fce4ec;
            border-radius: 12px;
            padding: 18px 22px;
            text-decoration: none;
            color: #2d1a26;
            transition: border-color 0.2s, transform 0.2s;
        }

        .contact-card:hover {
            border-color: #f48fb1;
            transform: translateY(-3px);
        }

        .contact-card .label {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ad1457;
        }

        .contact-card .value {
            font-size: 1rem;
            font-weight: 300;
            color: #7b3f5e;
        }

        footer {
            text-align: center;
            padding: 24px;
            margin-top: 0px;
            border-top: 1px solid #ffc1f2;
            font-family: 'Playfair Display', serif;
            color: #f32697;
            font-size: 1rem;
            background: rgb(255, 190, 222);
        }

        @media (max-width: 600px) {
            .hero-inner {
                flex-direction: column;
                text-align: center;
            }

            .hero-text .greeting {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#home">HOME</a></li>
            <li><a href="#about">ABOUT</a></li>
        </ul>
        <span class="logo">Nesti</span>
    </nav>

    <main>
        <section id="home">
            <div class="hero-inner">
                <div class="hero-photo">
                    <img src="me.jpeg" alt="Foto Profil" />
                </div>
                <div class="hero-text">
                    <p class="greeting">Welcome to My Page ♡</p>
                    <h1>Honesti Bestari</h1>
                    <p class="tagline">Mahasiswa Teknik Informatika <br> Universitas Esa Unggul</p>
                    <a href="#about">Contact</a>
                </div>
            </div>
        </section>

        <section id="about">
        <h2>Contact</h2>
        <div class="contact-grid">
            <a href="https://wa.me/6282210098835" target="_blank" class="contact-card">
                <span class="label">WhatsApp</span>
                <span class="value">+62 822-1009-8835</span>
            </a>
            <a href="mailto:honestibestari@gmail.com" class="contact-card">
                <span class="label">Email</span>
                <span class="value">honestibestari@gmail.com</span>
            </a>
        </div>

        <h2 style="margin-top: 48px;">Social Media</h2>
        <div class="contact-grid" style="max-width: 340px;">
            <a href="https://www.instagram.com/nnes.tjhia_/" target="_blank" class="contact-card">
                <span class="label">Instagram</span>
                <span class="value">@nnes.tjhia_</span>
            </a>
        </div>
    </section>
    </main>

    <footer>
        <i>♡ Thank you for visiting my page ♡</i>
        <p>&copy; 2026 Honesti Bestari</p>
    </footer>

</body>
</html>
