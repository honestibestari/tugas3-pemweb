<!DOCTYPE html>
<html>
<head>
    <title>Profil Saya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        nav {
            background-color: #ffc8d8;
            padding: 14px 32px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }
        nav ul a {
        text-decoration: none;
        color: black;
        font-size: 0.95rem;
        transition: 0.2s;
        }

        nav ul a:hover {
            color: brown;
        }

        body {
            line-height: 1.5;
            font-family: 'Poppins', sans-serif;
        }

        #home {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
            padding: 60px 32px;
        }

        #home img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffc8d8;
        }

        #home .hero-text h1 {
            font-size: 2rem;
            color: #c94d6b;
            margin-bottom: 8px;
        }

        #home .hero-text p {
            color: #9b6878;
            margin-bottom: 16px;
        }

        #home .hero-text a {
            background-color: #e8728f;
            color: white;
            padding: 10px 24px;
            border-radius: 24px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        #home .hero-text a:hover {
            background-color: pink;
        }

        #about {
            padding: 50px 32px;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        #about h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #c94d6b;
        }

        #about h2:nth-of-type(2) {
            margin-top: 50px;
        }

        #about .contact-list {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #about .contact-list a {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background-color: white;
            border: 1px solid #ffc8d8;
            border-radius: 12px;
            padding: 16px 22px;
            text-decoration: none;
            color: #3d2030;
            font-size: 0.9rem;
            min-width: 200px;
            transition: 0.3s;
        }

        #about .contact-list a:hover {
            background-color: #ffc8d8;
            transform: translateY(-3px); /* efek naik sedikit */
        }

        .label {
            font-size: 0.75rem;
            color: #c94d6b;
            font-weight: bold;
            text-transform: uppercase;
        }

        .value {
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            padding: 24px;
            margin-top: 20px;
            border-top: 1px solid #ffc8d8;
            color: #9b6878;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            #home {
                flex-direction: column;
                text-align: center;
            }

            #about {
                flex-direction: column;
            }
        }

        h1, h2 {
            font-weight: 600;
            letter-spacing: 1px;
        }

        p {
            font-weight: 300;
        }

        nav ul a {
            font-weight: 500;
        }


    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#home">HOME</a></li>
            <li><a href="#about">ABOUT</a></li>
        </ul>
    </nav>


    <section id="home" style="text-align: center;">
        <img src="me.jpeg" alt="Foto Profil"/>
        <div class="hero-text">
            <p style="color: #e8728f; margin-bottom: 6px;">♡ Selamat datang di halaman saya ♡</p>
            <h1>HONESTI BESTARI</h1>
            <p>Mahasiswa Teknik Informatika</p>
            <a href="#about">Contact</a>
        </div>
    </section>

    <hr/>

    <section id="about">
        <h2>Contact</h2>

        <div class="contact-list">
            <a href="https://wa.me/6282210098835" target="_blank">
                <span class="label">WhatsApp</span>
                <span class="value">+62 822-1009-8835</span>
            </a>

            <a href="mailto:honestibestari@gmail.com">
                <span class="label">Email</span>
                <span class="value">honestibestari@gmail.com</span>
            </a>
        </div>

        <h2>Social Media</h2>

        <div class="contact-list">
            <a href="https://www.instagram.com/nnes.tjhia_/" target="_blank">
                <span class="label">Instagram</span>
                <span class="value">@nnes.tjhia_</span>
            </a>
        </div>
    </section>
<br>
<footer>
    <i>♡ Terima kasih sudah mengunjungi halaman saya ♡</i><br /><br />
    &copy; 2026 Honesti Bestari
</footer>

</body>
</html>
